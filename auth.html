<!DOCTYPE html>
<html>
<head>
    <title>MUONS | Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* AUTH PAGE EXTRA STYLES */
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 440px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            color: #22D3EE;
            letter-spacing: 4px;
        }

        .auth-logo p {
            color: #94A3B8;
            font-size: 13px;
            margin-top: 6px;
        }

        .auth-card {
            background: rgba(15,23,42,0.7);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 16px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #94A3B8;
            border-bottom: 2px solid transparent;
            transition: 0.3s ease;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }

        .auth-tab.active {
            color: #22D3EE;
            border-bottom: 2px solid #22D3EE;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94A3B8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            background: #0F172A;
            color: #FFFFFF;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border: 1px solid #22D3EE;
            box-shadow: 0 0 10px rgba(34,211,238,0.2);
        }

        .form-group select option {
            background: #0F172A;
        }

        .auth-submit {
            width: 100%;
            padding: 13px;
            border-radius: 8px;
            border: none;
            background: #0017A8;
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 0 20px rgba(0,23,168,0.4);
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
        }

        .auth-submit:hover {
            box-shadow: 0 0 35px rgba(34,211,238,0.6);
            background: #0022ff;
        }

        .auth-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .auth-message.success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            color: #4ADE80;
            display: block;
        }

        .auth-message.error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #F87171;
            display: block;
        }

        .auth-message.info {
            background: rgba(34,211,238,0.1);
            border: 1px solid rgba(34,211,238,0.3);
            color: #22D3EE;
            display: block;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: #94A3B8;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .back-home a:hover {
            color: #22D3EE;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="container navbar-inner">
        <div class="logo">MUONS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="gallery.html">Gallery</a>
        </div>
    </div>
</div>

<!-- AUTH SECTION -->
<section class="auth-section">
    <div class="auth-wrapper">

        <!-- LOGO -->
        <div class="auth-logo">
            <h1>MUONS</h1>
            <p>Media Unit Of Negombo Southernians</p>
        </div>

        <!-- AUTH CARD -->
        <div class="auth-card">

            <!-- TABS -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- MESSAGE BOX -->
            <div class="auth-message" id="authMessage"></div>

            <!-- LOGIN FORM -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">

                <div class="form-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        id="loginEmail"
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input
                        type="password"
                        id="loginPassword"
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="auth-submit" id="loginBtn">
                    Login to Portal
                </button>

            </form>

            <!-- REGISTER FORM -->
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">

                <div class="form-group">
                    <label>Full Name</label>
                    <input
                        type="text"
                        id="regName"
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        id="regEmail"
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input
                        type="password"
                        id="regPassword"
                        placeholder="Create a password"
                        required
                        minlength="6"
                    >
                </div>

                <div class="form-group">
                    <label>Role</label>
                    <select id="regRole" required>
                        <option value="">Select your role</option>
                        <option value="student">Student</option>
                        <option value="member">MUONS Member</option>
                        <option value="alumni">MUONS Alumni</option>
                        <option value="tech">Tech Team</option>
                    </select>
                </div>

                <button type="submit" class="auth-submit" id="registerBtn">
                    Register
                </button>

            </form>

        </div>

        <!-- BACK HOME -->
        <div class="back-home">
            <a href="index.html">← Back to Home</a>
        </div>

    </div>
</section>

<!-- FOOTER -->
<div class="footer">
    <div>© 2026 Media Unit Of Negombo Southernians | All Rights Reserved</div>
    <div class="credit">Designed & Developed by <span>Aken Sanketh</span></div>
</div>

<script src="api.js"></script>
<script>

// ============================================
//   TAB SWITCHER
// ============================================
function switchTab(tab) {
    document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".auth-form").forEach(f => f.classList.remove("active"));

    if (tab === "login") {
        document.querySelectorAll(".auth-tab")[0].classList.add("active");
        document.getElementById("loginForm").classList.add("active");
    } else {
        document.querySelectorAll(".auth-tab")[1].classList.add("active");
        document.getElementById("registerForm").classList.add("active");
    }

    clearMessage();
}

// ============================================
//   MESSAGE HELPER
// ============================================
function showMessage(text, type) {
    const msg = document.getElementById("authMessage");
    msg.textContent = text;
    msg.className = "auth-message " + type;
}

function clearMessage() {
    const msg = document.getElementById("authMessage");
    msg.className = "auth-message";
    msg.textContent = "";
}

// ============================================
//   LOGIN HANDLER
// ============================================
async function handleLogin(e) {
    e.preventDefault();

    const email    = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const btn      = document.getElementById("loginBtn");

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
    clearMessage();

    const result = await loginUser(email, password);

    if (result.success) {
        saveSession(result.user);
        showMessage("Login successful! Redirecting...", "success");

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);

    } else {
        showMessage(result.message, "error");
        btn.disabled = false;
        btn.innerHTML = "Login to Portal";
    }
}

// ============================================
//   REGISTER HANDLER
// ============================================
async function handleRegister(e) {
    e.preventDefault();

    const name     = document.getElementById("regName").value;
    const email    = document.getElementById("regEmail").value;
    const password = document.getElementById("regPassword").value;
    const role     = document.getElementById("regRole").value;
    const btn      = document.getElementById("registerBtn");

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span> Registering...';
    clearMessage();

    const result = await registerUser(name, email, password, role);

    if (result.success) {
        showMessage(result.message, "success");
        btn.disabled = false;
        btn.innerHTML = "Register";
        document.getElementById("registerForm").reset();

    } else {
        showMessage(result.message, "error");
        btn.disabled = false;
        btn.innerHTML = "Register";
    }
}

// ============================================
//   REDIRECT IF ALREADY LOGGED IN
// ============================================
if (isLoggedIn()) {
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
